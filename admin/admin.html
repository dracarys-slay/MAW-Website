<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MAW Robotics</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 20% 20%, #113677 0%, #0b1738 45%, #060b1b 100%);
            color: #0f2344;
        }

        .admin-login-shell {
            width: min(460px, 92vw);
            background: #ffffff;
            border: 1px solid #d8e1f1;
            border-radius: 16px;
            box-shadow: 0 18px 44px rgba(2, 14, 40, 0.38);
            padding: 28px;
        }

        h1 {
            margin: 0;
            font-size: 1.7rem;
            color: #092451;
        }

        .subhead {
            margin: 10px 0 26px;
            color: #4f6180;
            line-height: 1.5;
        }

        .access-note {
            margin: 0 0 18px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #dce7f9;
            background: #f3f7ff;
            color: #184286;
            font-size: 0.94rem;
        }

        .login-form {
            display: grid;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #0f2344;
            font-weight: 700;
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #c6d4ec;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        input:focus {
            outline: 2px solid #1f69df;
            outline-offset: 1px;
            border-color: #1f69df;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 0.98rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #0f4fb8 0%, #0f88cf 100%);
            color: #ffffff;
        }

        button:hover {
            filter: brightness(1.06);
        }

        .message {
            display: none;
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.93rem;
        }

        .message.error {
            display: block;
            background: #fff1f1;
            color: #8a1f1f;
            border: 1px solid #efc0c0;
        }

        .message.success {
            display: block;
            background: #edfef1;
            color: #1b6f34;
            border: 1px solid #bbf0c7;
        }

        .back-link {
            margin-top: 18px;
            font-size: 0.93rem;
        }

        .back-link a {
            color: #0f4fb8;
            text-decoration: none;
            font-weight: 700;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="admin-login-shell">
        <h1>MAW Robotics Admin</h1>
        <p class="subhead">Restricted administration panel for MAW Future Tech operations.</p>

        <p class="access-note">Admin login is protected by credentials.</p>

        <form id="adminLoginForm" class="login-form" novalidate>
            <div>
                <label for="adminEmail">Admin Email</label>
                <input id="adminEmail" name="adminEmail" type="email" autocomplete="username" required>
            </div>
            <div>
                <label for="adminPassword">Password</label>
                <input id="adminPassword" name="adminPassword" type="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Login to Dashboard</button>
        </form>

        <div id="errorMessage" class="message"></div>
        <div id="successMessage" class="message"></div>

        <p class="back-link"><a href="../index.html">Back to website</a></p>
    </main>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script>
const loginForm = document.getElementById('adminLoginForm')
const errorMessage = document.getElementById('errorMessage')
const successMessage = document.getElementById('successMessage')

function showMessage(type, message) {
    errorMessage.className = 'message'
    successMessage.className = 'message'
    errorMessage.textContent = ''
    successMessage.textContent = ''
    if (type === 'error') {
        errorMessage.className = 'message error'
        errorMessage.textContent = message
    } else {
        successMessage.className = 'message success'
        successMessage.textContent = message
    }
}

// Wait for Supabase to load then check session
window.addEventListener('load', async () => {
    const { data: { session } } = await supabaseClient.auth.getSession()
    if (session) {
        window.location.href = 'dashboard.html'
    }
})

loginForm.addEventListener('submit', async function(e) {
    e.preventDefault()

    const email = document.getElementById('adminEmail').value.trim()
    const password = document.getElementById('adminPassword').value

    const submitBtn = document.querySelector('#adminLoginForm button')
    submitBtn.textContent = 'Logging in...'
    submitBtn.disabled = true

    try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email,
            password
        })

        if (error) throw error

        showMessage('success', 'Login successful! Redirecting to dashboard...')
        setTimeout(() => {
            window.location.href = 'dashboard.html'
        }, 900)

    } catch (error) {
        showMessage('error', 'Invalid email or password. Please try again.')
        console.error('Login error:', error.message)
    } finally {
        submitBtn.textContent = 'Login to Dashboard'
        submitBtn.disabled = false
    }
})
</script>
</body>
</html>
